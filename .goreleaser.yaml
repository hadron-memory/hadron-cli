# goreleaser config (D6). Releases are cut by
# .github/workflows/release.yml on every v* tag push.
version: 2

project_name: hadron

builds:
  - main: ./cmd/hadron
    binary: hadron
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/hadron-memory/hadron-cli/internal/build.Version={{.Version}}
      - -X github.com/hadron-memory/hadron-cli/internal/build.Commit={{.ShortCommit}}
      - -X github.com/hadron-memory/hadron-cli/internal/build.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

homebrew_casks:
  - repository:
      owner: hadron-memory
      name: homebrew-tap
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    homepage: https://hadronmemory.com
    description: CLI for the Hadron AI-memory platform
    # Cross-repo pushes need the HOMEBREW_TAP_TOKEN repo secret (a PAT
    # with write access to hadron-memory/homebrew-tap; the workflow's
    # GITHUB_TOKEN cannot push to a sibling repo). Until that secret is
    # configured, leave skip_upload: true and bump the cask in the tap
    # manually from the release's checksums.txt.
    skip_upload: true

changelog:
  use: github-native
