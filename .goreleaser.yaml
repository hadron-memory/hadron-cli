# goreleaser config (D6). Releases are cut by
# .github/workflows/release.yml on every v* tag push.
version: 2

project_name: hadron

builds:
  - id: hadron
    main: ./cmd/hadron
    binary: hadron
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/hadron-memory/hadron-cli/internal/build.Version={{.Version}}
      - -X github.com/hadron-memory/hadron-cli/internal/build.Commit={{.ShortCommit}}
      - -X github.com/hadron-memory/hadron-cli/internal/build.Date={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

# Codesign (Developer ID Application) + notarize the darwin binaries so macOS
# Gatekeeper passes them on first run — the goal being to retire the cask's
# quarantine-strip hook (#158). goreleaser drives this with quill (pure Go), so
# it runs on the Linux release runner — no macOS runner needed. Notarization
# happens after build and before archiving, so the archives carry the signed
# binary.
#
# GATED: enabled only when the signing secrets are present, so a release still
# works (unsigned) until the Apple credentials are configured. Needs five repo
# secrets — see the "Releasing" section of the README for how to mint them:
#   MACOS_SIGN_P12          base64 of the Developer ID Application cert (.p12)
#   MACOS_SIGN_PASSWORD     the .p12 export password
#   MACOS_NOTARY_ISSUER_ID  App Store Connect API key issuer id
#   MACOS_NOTARY_KEY_ID     App Store Connect API key id
#   MACOS_NOTARY_KEY        base64 of the App Store Connect API private key (.p8)
notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids: [hadron]
      sign:
        certificate: '{{ .Env.MACOS_SIGN_P12 }}'
        password: '{{ .Env.MACOS_SIGN_PASSWORD }}'
      notarize:
        issuer_id: '{{ .Env.MACOS_NOTARY_ISSUER_ID }}'
        key_id: '{{ .Env.MACOS_NOTARY_KEY_ID }}'
        key: '{{ .Env.MACOS_NOTARY_KEY }}'
        wait: true
        timeout: 30m

checksum:
  name_template: checksums.txt

# Keyless cosign signature over checksums.txt, so a downloader can verify the
# checksum manifest is the one this pipeline produced — not merely internally
# consistent (#123). Keyless uses the release job's GitHub OIDC identity (no
# long-lived key); the short-lived signing cert is recorded in the public Rekor
# transparency log. Emits a single Sigstore bundle (cosign v3 / goreleaser),
# checksums.txt.sigstore.json — cert + signature + Rekor entry in one file — next
# to the manifest on the Release. Requires cosign on the runner and
# `id-token: write` in the workflow.
signs:
  - cmd: cosign
    signature: '${artifact}.sigstore.json'
    args:
      - sign-blob
      - '--bundle=${signature}'
      - '${artifact}'
      - '--yes'
    artifacts: checksum
    output: true

homebrew_casks:
  - repository:
      owner: hadron-memory
      name: homebrew-hadron-cli
      token: '{{ .Env.HOMEBREW_TAP_TOKEN }}'
    homepage: https://hadronmemory.com
    description: CLI for the Hadron AI-memory platform
    # The cask is pushed to hadron-memory/homebrew-hadron-cli on every release
    # via the HOMEBREW_TAP_TOKEN repo secret (a token with write access to that
    # repo;
    # the workflow's GITHUB_TOKEN can't push to a sibling repo). That secret
    # MUST exist — the workflow falls back to GITHUB_TOKEN, which would fail the
    # cask upload and the release.
    # Strip the Gatekeeper quarantine flag on install; without it an UNSIGNED
    # first run is blocked with "hadron cannot be opened". Once the notarize block
    # above is active (signing secrets configured) this becomes redundant — a
    # notarized binary passes Gatekeeper on its own — and should be removed after
    # the first notarized release is verified (#158). must_succeed:false keeps it
    # harmless in the meantime.
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/hadron"], must_succeed: false

changelog:
  use: github-native
