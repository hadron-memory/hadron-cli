# Uniform paginated app list (hadron-server#473) — { items, total } envelope,
# limit capped at 200 server-side; `app ls` pages to exhaustion.
query Apps(
  $orgId: ID!
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  apps(orgId: $orgId, limit: $limit, offset: $offset) {
    total
    items {
      id
      urn
      name
      appType
      agentId
      memberCount
      createdAt
    }
  }
}

mutation CreateApp(
  $orgId: ID!
  $agentId: ID!
  $name: String!
  # @genqlient(omitempty: true)
  $urn: String
  # @genqlient(omitempty: true)
  $appType: AppType
  # @genqlient(omitempty: true)
  $description: String
) {
  createApp(
    orgId: $orgId
    agentId: $agentId
    name: $name
    urn: $urn
    appType: $appType
    description: $description
  ) {
    id
    urn
    name
    appType
    agentId
    memberCount
    createdAt
  }
}

mutation DeleteApp($id: ID!) {
  deleteApp(id: $id)
}
