# General secret store (#677). Secret values are write-only: readers never
# select or print them.

fragment SecretFields on Secret {
  id
  ownerType
  ownerId
  name
  kind
  metadata
  createdAt
  createdBy
  updatedAt
  updatedBy
}

query Secrets(
  $ownerType: String!
  # @genqlient(omitempty: true)
  $ownerRef: ID
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  secrets(ownerType: $ownerType, ownerRef: $ownerRef, limit: $limit, offset: $offset) {
    items {
      ...SecretFields
    }
    total
  }
}

mutation CreateSecret(
  $ownerType: String!
  # @genqlient(omitempty: true)
  $ownerRef: ID
  $name: String!
  $kind: String!
  # @genqlient(omitempty: true)
  $metadata: JSON
  $value: JSON!
) {
  createSecret(ownerType: $ownerType, ownerRef: $ownerRef, name: $name, kind: $kind, metadata: $metadata, value: $value) {
    ...SecretFields
  }
}

mutation DeleteSecret($ref: ID!) {
  deleteSecret(ref: $ref)
}
