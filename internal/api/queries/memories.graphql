query MyMemories(
  # @genqlient(omitempty: true)
  $includeAgentSystem: Boolean
) {
  myMemories(includeAgentSystem: $includeAgentSystem) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    updatedAt
  }
}

mutation CreateMemory(
  $orgId: ID!
  $name: String!
  # @genqlient(omitempty: true)
  $memoryClass: MemoryClass
  # @genqlient(omitempty: true)
  $shortDescription: String
  # @genqlient(omitempty: true)
  $description: String
  # bound to *[]string so an explicitly-passed empty list still
  # serializes as [] (clear) — omitempty on a plain slice would drop it.
  # @genqlient(omitempty: true, bind: "*[]string")
  $tags: [String!]
  # @genqlient(omitempty: true)
  $visibility: MemoryVisibility
) {
  createMemory(
    orgId: $orgId
    name: $name
    memoryClass: $memoryClass
    shortDescription: $shortDescription
    description: $description
    tags: $tags
    visibility: $visibility
  ) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    updatedAt
  }
}

# Omitted = preserve; flags the user didn't pass must not reach the wire.
mutation UpdateMemory(
  $id: ID!
  # @genqlient(omitempty: true)
  $name: String
  # @genqlient(omitempty: true)
  $shortDescription: String
  # @genqlient(omitempty: true)
  $description: String
  # bound to *[]string so an explicitly-passed empty list still
  # serializes as [] (clear) — omitempty on a plain slice would drop it.
  # @genqlient(omitempty: true, bind: "*[]string")
  $tags: [String!]
  # @genqlient(omitempty: true)
  $visibility: MemoryVisibility
) {
  updateMemory(
    id: $id
    name: $name
    shortDescription: $shortDescription
    description: $description
    tags: $tags
    visibility: $visibility
  ) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    updatedAt
  }
}

mutation DeleteMemory($id: ID!) {
  deleteMemory(id: $id)
}

query GetMemory($id: ID!) {
  memory(id: $id) {
    id
    urn
    name
    shortDescription
    description
    class
    visibility
    organizationId
    isEncrypted
    tags
    source
    syncStatus
    vectorIndexEnabled
    createdAt
    updatedAt
  }
}

mutation CloneMemory($id: ID!, $name: String!) {
  cloneMemory(id: $id, name: $name) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    updatedAt
  }
}
