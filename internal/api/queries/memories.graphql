# Uniform paginated memory list (hadron-server#473) — replaces myMemories.
# The noisy agent system class is hidden unless filter.memoryClasses names it
# explicitly; limit is capped at 200 server-side, so whole-scope callers page
# to exhaustion (api.CollectAll).
# @genqlient(for: "MemoryFilter.memoryClasses", omitempty: true)
# @genqlient(for: "MemoryFilter.visibility", omitempty: true)
query Memories(
  # @genqlient(omitempty: true)
  $filter: MemoryFilter
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  memories(filter: $filter, limit: $limit, offset: $offset) {
    total
    items {
      id
      urn
      name
      shortDescription
      class
      visibility
      organizationId
      isEncrypted
      maxRevCount
      updatedAt
    }
  }
}

mutation CreateMemory(
  $orgId: ID!
  $name: String!
  # @genqlient(omitempty: true)
  $memoryClass: MemoryClass
  # @genqlient(omitempty: true)
  $shortDescription: String
  # @genqlient(omitempty: true)
  $description: String
  # bound to *[]string so an explicitly-passed empty list still
  # serializes as [] (clear) — omitempty on a plain slice would drop it.
  # @genqlient(omitempty: true, bind: "*[]string")
  $tags: [String!]
  # @genqlient(omitempty: true)
  $visibility: MemoryVisibility
  # #621 — per-node revision-history cap (min 1). Omitted = server default.
  # @genqlient(omitempty: true)
  $maxRevCount: Int
) {
  createMemory(
    orgId: $orgId
    name: $name
    memoryClass: $memoryClass
    shortDescription: $shortDescription
    description: $description
    tags: $tags
    visibility: $visibility
    maxRevCount: $maxRevCount
  ) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    updatedAt
  }
}

# Create a new App-scoped app/personal/private memory. The server owns URN
# composition: app-class URNs are name-derived; personal/private use opaque
# per-owner identities, so this mutation intentionally has no slug argument.
mutation CreateMemoryInApp(
  $appRef: ID!
  $agentRef: ID!
  $memoryClass: MemoryClass!
  $name: String!
  # @genqlient(omitempty: true)
  $shortDescription: String
  # @genqlient(omitempty: true)
  $description: String
  # bound to *[]string so an explicitly-passed empty list still serializes as [].
  # @genqlient(omitempty: true, bind: "*[]string")
  $tags: [String!]
  # @genqlient(omitempty: true)
  $maxRevCount: Int
) {
  createMemoryInApp(
    appRef: $appRef
    agentRef: $agentRef
    memoryClass: $memoryClass
    name: $name
    shortDescription: $shortDescription
    description: $description
    tags: $tags
    maxRevCount: $maxRevCount
  ) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    updatedAt
  }
}

# Bind an existing free-standing personal/private memory to an App. All refs
# accept either IDs or URNs and are resolved by the server.
mutation AttachMemoryToApp($memoryRef: ID!, $appRef: ID!, $agentRef: ID!) {
  attachMemoryToApp(memoryRef: $memoryRef, appRef: $appRef, agentRef: $agentRef) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    updatedAt
  }
}

# Omitted = preserve; flags the user didn't pass must not reach the wire.
mutation UpdateMemory(
  $id: ID!
  # @genqlient(omitempty: true)
  $name: String
  # @genqlient(omitempty: true)
  $shortDescription: String
  # @genqlient(omitempty: true)
  $description: String
  # bound to *[]string so an explicitly-passed empty list still
  # serializes as [] (clear) — omitempty on a plain slice would drop it.
  # @genqlient(omitempty: true, bind: "*[]string")
  $tags: [String!]
  # @genqlient(omitempty: true)
  $visibility: MemoryVisibility
  # @genqlient(omitempty: true)
  $data: JSON
  # The new URN slug (a bare slug, e.g. "hadrontool-pdf"). The server
  # kebab-normalizes it and recomposes the memory URN. Omitted = preserve.
  # @genqlient(omitempty: true)
  $urn: String
  # #621 — per-node revision-history cap (min 1). Omitted = preserve.
  # @genqlient(omitempty: true)
  $maxRevCount: Int
) {
  updateMemory(
    id: $id
    name: $name
    shortDescription: $shortDescription
    description: $description
    tags: $tags
    visibility: $visibility
    data: $data
    urn: $urn
    maxRevCount: $maxRevCount
  ) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    data
    updatedAt
  }
}

mutation DeleteMemory($id: ID!) {
  deleteMemory(id: $id)
}

# memory(ref:) accepts the memory's PK id or URN (hadron-server#473).
query GetMemory($ref: ID!) {
  memory(ref: $ref) {
    id
    urn
    name
    shortDescription
    description
    class
    visibility
    organizationId
    isEncrypted
    tags
    source
    syncStatus
    vectorIndexEnabled
    maxRevCount
    data
    createdAt
    updatedAt
  }
}

mutation CloneMemory($ref: ID!, $targetUrn: String!) {
  cloneMemory(ref: $ref, targetUrn: $targetUrn) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    updatedAt
  }
}

# Extract a parent node + its loc-subtree into a new memory (hadron-server#637).
# move = false copies (source intact); move = true relocates, soft-deleting the
# source subtree. The default is applied server-side, so it is omitted when the
# --move flag is not set.
mutation ExtractParentNodeToMemory(
  $parentRef: ID!
  $targetUrn: String!
  # @genqlient(omitempty: true)
  $move: Boolean
) {
  extractParentNodeToMemory(parentRef: $parentRef, targetUrn: $targetUrn, move: $move) {
    id
    urn
    name
    shortDescription
    class
    visibility
    organizationId
    isEncrypted
    maxRevCount
    updatedAt
  }
}

# Convert a plaintext memory to encrypted-at-rest (#57). One-way: the caller
# provides the data key and all node content/data is rewritten as ciphertext in
# a single transaction. There is no decrypt mutation, so the command gates like a
# destructive op.
mutation EncryptMemory($memoryId: ID!, $dataKey: String!) {
  encryptMemory(memoryId: $memoryId, dataKey: $dataKey) {
    id
    urn
    name
    isEncrypted
  }
}
