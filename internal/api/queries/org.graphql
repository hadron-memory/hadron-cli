# Organization & membership management (#56). Roles are the shared Role enum
# (OWNER/ADMIN/CONTRIBUTOR/READER).

fragment OrgFields on Organization {
  id
  urn
  name
  isVisible
  createdAt
  updatedAt
}

fragment UserFields on User {
  id
  name
  email
  handle
  githubUsername
  roles
}

# organization(ref:) accepts the org's PK id or URN (hadron-server#473).
query GetOrganization($ref: ID!) {
  organization(ref: $ref) {
    ...OrgFields
  }
}

# organization(ref) is the only path to an org's members.
query OrgMembers($ref: ID!) {
  organization(ref: $ref) {
    id
    members {
      id
      role
      canInvite
      user {
        ...UserFields
      }
    }
  }
}

# The uniform single-user read (hadron-server#473): ref accepts a PK or an
# hrn:user:<handle> URN; denied and missing are both null (anti-enumeration).
# The access-check user resolution tries this before falling back to the
# paged search below.
query GetUser($ref: ID!) {
  user(ref: $ref) {
    ...UserFields
  }
}

# Uniform paginated user list (hadron-server#473) — replaces searchUsers.
# Non-admin callers must pass filter.query (enumeration-safe matching:
# handle/githubUsername substring, email exact). Results are name-ascending,
# so an EXACT identifier match can sit past the first 200-cap page — user-ref
# resolution pages via api.CollectUntil with an exact-match short-circuit.
query SearchUsers(
  $query: String!
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  users(filter: { query: $query }, limit: $limit, offset: $offset) {
    total
    items {
      ...UserFields
    }
  }
}

mutation CreateOrganization($name: String!, $urn: String!) {
  createOrganization(name: $name, urn: $urn) {
    ...OrgFields
  }
}

mutation UpdateOrganization(
  $id: ID!
  # @genqlient(omitempty: true)
  $name: String
  # @genqlient(omitempty: true)
  $urn: String
  # @genqlient(omitempty: true)
  $isVisible: Boolean
) {
  updateOrganization(id: $id, name: $name, urn: $urn, isVisible: $isVisible) {
    ...OrgFields
  }
}

mutation DeleteOrganization($id: ID!) {
  deleteOrganization(id: $id)
}

mutation AddOrgMember($orgId: ID!, $userId: ID!, $role: Role!) {
  addOrgMember(orgId: $orgId, userId: $userId, role: $role) {
    id
    role
    user {
      ...UserFields
    }
  }
}

mutation UpdateOrgMember($orgId: ID!, $userId: ID!, $role: Role!) {
  updateOrgMember(orgId: $orgId, userId: $userId, role: $role) {
    id
    role
    user {
      ...UserFields
    }
  }
}

mutation RemoveOrgMember($orgId: ID!, $userId: ID!) {
  removeOrgMember(orgId: $orgId, userId: $userId)
}
