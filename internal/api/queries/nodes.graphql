query Nodes(
  # @genqlient(omitempty: true)
  $memory: ID
  # @genqlient(omitempty: true)
  $prefix: String
  # @genqlient(omitempty: true)
  $nodeType: String
  # @genqlient(omitempty: true)
  $tags: [String!]
  # @genqlient(omitempty: true)
  $search: String
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  nodes(
    memory: $memory
    prefix: $prefix
    nodeType: $nodeType
    tags: $tags
    search: $search
    limit: $limit
    offset: $offset
  ) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    updatedAt
  }
}

query ResolveUrn($urn: String!) {
  resolveUrn(urn: $urn) {
    id
    kind
    memoryId
  }
}

# Bulk read of full nodes by id (cor:api:040). Server caps a call at 200
# nodes / 1 MB: an over-cap window comes back with truncated=true and the
# spillover ids in `omitted`, so callers must re-request those; `unavailable`
# lists ids the server could not return (deleted/inaccessible). Selects a full
# node projection — both edge directions (with target/source loc + memoryId),
# everything the markdown exporter serializes, and the fields the spec detail/
# lint builders read — so the whole-corpus fan-outs (`memory export`,
# `spec get --prefix`) read in ceil(N/200) round-trips instead of one nodeById
# per node. Driven through api.CollectNodeBatch.
# @genqlient(omitempty: true)
query NodeBatch($ids: [ID!]) {
  nodeBatch(ids: $ids) {
    truncated
    omitted
    unavailable
    nodes {
      id
      memoryId
      loc
      name
      alias
      nodeType
      description
      abstract
      abstractOriginHash
      tags
      seq
      data
      properties
      content
      updatedAt
      outgoingEdges {
        label
        priority
        condition
        target {
          id
          loc
          memoryId
        }
      }
      incomingEdges {
        label
        source {
          id
          loc
          memoryId
        }
      }
    }
  }
}

query GetNodeById($id: ID!) {
  nodeById(id: $id) {
    id
    memoryId
    loc
    name
    description
    abstract
    abstractOriginHash
    nodeType
    tags
    content
    data
    seq
    createdAt
    updatedAt
    outgoingEdges {
      id
      label
      priority
      target {
        id
        loc
        memoryId
      }
    }
    incomingEdges {
      id
      label
      priority
      source {
        id
        loc
        memoryId
      }
    }
  }
}

# Semantic + keyword search (spec 033). hybrid mode degrades to keyword
# (with a `degraded`/`reason` note) on memories without a vector index,
# so `spec find` is never silently empty. Backs `hadron spec find`.
query NodeSearch(
  $query: String!
  # @genqlient(omitempty: true)
  $mode: SearchMode
  # @genqlient(omitempty: true)
  $memoryUrn: String
  # @genqlient(omitempty: true)
  $limit: Int
) {
  nodeSearch(query: $query, mode: $mode, memoryUrn: $memoryUrn, limit: $limit) {
    degraded
    reason
    nodes {
      id
      memoryId
      loc
      name
      nodeType
      tags
      updatedAt
    }
  }
}

# The server treats omitted NodeInput fields as "preserve" and explicit
# nulls as "clear" — nil pointers must therefore be omitted from the
# request, not serialized as null.
# @genqlient(for: "NodeInput.abstract", omitempty: true)
# @genqlient(for: "NodeInput.aiAgent", omitempty: true)
# @genqlient(for: "NodeInput.alias", omitempty: true)
# @genqlient(for: "NodeInput.content", omitempty: true)
# @genqlient(for: "NodeInput.createOnly", omitempty: true)
# @genqlient(for: "NodeInput.data", omitempty: true)
# @genqlient(for: "NodeInput.description", omitempty: true)
# @genqlient(for: "NodeInput.edges", omitempty: true)
# @genqlient(for: "NodeInput.id", omitempty: true)
# @genqlient(for: "NodeInput.llmModel", omitempty: true)
# @genqlient(for: "NodeInput.nodeType", omitempty: true)
# @genqlient(for: "NodeInput.ownerRepo", omitempty: true)
# @genqlient(for: "NodeInput.properties", omitempty: true)
# @genqlient(for: "NodeInput.seq", omitempty: true)
# @genqlient(for: "NodeInput.tags", omitempty: true)
mutation UpsertNode(
  $input: NodeInput!
) {
  upsertNode(input: $input) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    updatedAt
  }
}

mutation DeleteNode($loc: String!, $memoryId: String!) {
  deleteNode(loc: $loc, memoryId: $memoryId)
}

# Unset optional variables must be omitted from the wire, not sent as
# explicit nulls — the server rejects priority: null (hadron-server#263)
# and treats condition/data: null as "clear".
mutation CreateEdge(
  $sourceNodeId: ID!
  $targetNodeId: ID!
  $label: String!
  # @genqlient(omitempty: true)
  $priority: Int
  # @genqlient(omitempty: true)
  $condition: JSON
  # @genqlient(omitempty: true)
  $data: JSON
) {
  createEdge(
    sourceNodeId: $sourceNodeId
    targetNodeId: $targetNodeId
    label: $label
    priority: $priority
    condition: $condition
    data: $data
  ) {
    id
    label
    priority
    source {
      id
      loc
    }
    target {
      id
      loc
    }
  }
}

# Omitted = preserve, explicit null = clear (condition/data) or unset
# (priority). Flags the user didn't pass must not reach the wire.
mutation UpdateEdge(
  $edgeId: ID!
  # @genqlient(omitempty: true)
  $label: String
  # @genqlient(omitempty: true)
  $priority: Int
  # @genqlient(omitempty: true)
  $condition: JSON
  # @genqlient(omitempty: true)
  $data: JSON
) {
  updateEdge(
    edgeId: $edgeId
    label: $label
    priority: $priority
    condition: $condition
    data: $data
  ) {
    id
    label
    priority
    source {
      id
      loc
    }
    target {
      id
      loc
    }
  }
}

mutation DeleteEdge($edgeId: ID!) {
  deleteEdge(edgeId: $edgeId)
}
