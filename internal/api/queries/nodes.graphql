# Unified node list + search (cor:api:090) — the one field that supersedes the
# old `nodes` list and `nodeSearch`. Omit $query for a filtered list in
# deterministic order (subsumes `nodes`); pass $query to rank by $mode
# (keyword | vector | hybrid | regex). $filter is the structured, AND-combined
# selector context (memoryIds, locPrefix, nodeType, tags, isRunnable, …).
# Results are under hits[].node — never a bare array. Backs `node ls`,
# `node import`, `memory export`, and the `spec` reads; driven through
# api.FindNodes, which flattens hits→nodes and surfaces degraded/reason.
#
# The server treats an omitted NodeFilter field as "no constraint"; nil
# pointers must therefore be omitted, not sent as null — hence the per-field
# omitempty annotations mirroring nodes.graphql's NodeInput contract.
# @genqlient(for: "NodeFilter.memoryIds", omitempty: true)
# @genqlient(for: "NodeFilter.memoryClasses", omitempty: true)
# @genqlient(for: "NodeFilter.nodeType", omitempty: true)
# @genqlient(for: "NodeFilter.tags", omitempty: true)
# @genqlient(for: "NodeFilter.isRunnable", omitempty: true)
# @genqlient(for: "NodeFilter.locPrefix", omitempty: true)
# @genqlient(for: "NodeFilter.createdBy", omitempty: true)
# @genqlient(for: "NodeFilter.updatedAfter", omitempty: true)
# @genqlient(for: "NodeFilter.updatedBefore", omitempty: true)
# @genqlient(for: "NodeFilter.includeDeleted", omitempty: true)
query FindNodes(
  # @genqlient(omitempty: true)
  $query: String
  # @genqlient(omitempty: true)
  $mode: FindNodesMode
  # @genqlient(omitempty: true)
  $filter: NodeFilter
  # @genqlient(omitempty: true)
  $sort: NodeSort
  # @genqlient(omitempty: true)
  $limit: Int
  # @genqlient(omitempty: true)
  $offset: Int
) {
  findNodes(
    query: $query
    mode: $mode
    filter: $filter
    sort: $sort
    limit: $limit
    offset: $offset
  ) {
    total
    degraded
    reason
    hits {
      score
      node {
        id
        memoryId
        loc
        name
        nodeType
        tags
        seq
        isRunnable
        updatedAt
      }
    }
  }
}

query ResolveUrn($urn: String!) {
  resolveUrn(urn: $urn) {
    id
    kind
    memoryId
  }
}

# Bulk read of full nodes by id (cor:api:040). Server caps a call at 200
# nodes / 1 MB: an over-cap window comes back with truncated=true and the
# spillover ids in `omitted`, so callers must re-request those; `unavailable`
# lists ids the server could not return (deleted/inaccessible). Selects a full
# node projection — both edge directions (with target/source loc + memoryId),
# everything the markdown exporter serializes, and the fields the spec detail/
# lint builders read — so the whole-corpus fan-outs (`memory export`,
# `spec get --prefix`) read in ceil(N/200) round-trips instead of one node(ref)
# per node. Driven through api.CollectNodeBatch.
# @genqlient(omitempty: true)
query NodeBatch($ids: [ID!]) {
  nodeBatch(ids: $ids) {
    truncated
    omitted
    unavailable
    nodes {
      id
      memoryId
      loc
      name
      alias
      nodeType
      description
      abstract
      abstractOriginHash
      tags
      seq
      data
      properties
      content
      updatedAt
      outgoingEdges {
        name
        loc
        description
        isRunnable
        priority
        condition
        target {
          id
          loc
          memoryId
        }
      }
      incomingEdges {
        name
        loc
        isRunnable
        source {
          id
          loc
          memoryId
        }
      }
    }
  }
}

# The uniform single-node read (hadron-server#473) — node(ref:) subsumes the
# former nodeById(id:); ref accepts a PK, a fully-qualified node URN, or a
# bare loc (memory-scoped via the separate `memory` arg, unused here — the
# CLI resolves refs to PKs first via resolveUrn).
query GetNode($ref: ID!) {
  node(ref: $ref) {
    id
    memoryId
    loc
    name
    description
    abstract
    abstractOriginHash
    nodeType
    tags
    content
    data
    seq
    isRunnable
    createdAt
    updatedAt
    outgoingEdges {
      id
      name
      loc
      isRunnable
      priority
      target {
        id
        loc
        memoryId
      }
    }
    incomingEdges {
      id
      name
      loc
      isRunnable
      priority
      source {
        id
        loc
        memoryId
      }
    }
  }
}

# Create-only node write (spec 039 Phase 0 — upsertNode is gone). A live node
# already at (memoryId, loc) rejects with extensions.code NodeLocConflictError.
# Optional fields the caller leaves unset must be omitted from the wire, not
# serialized as null — hence the per-field omitempty annotations.
# @genqlient(for: "CreateNodeInput.abstract", omitempty: true)
# @genqlient(for: "CreateNodeInput.aiAgent", omitempty: true)
# @genqlient(for: "CreateNodeInput.alias", omitempty: true)
# @genqlient(for: "CreateNodeInput.content", omitempty: true)
# @genqlient(for: "CreateNodeInput.contentType", omitempty: true)
# @genqlient(for: "CreateNodeInput.data", omitempty: true)
# @genqlient(for: "CreateNodeInput.description", omitempty: true)
# @genqlient(for: "CreateNodeInput.edges", omitempty: true)
# @genqlient(for: "CreateNodeInput.id", omitempty: true)
# @genqlient(for: "CreateNodeInput.isRunnable", omitempty: true)
# @genqlient(for: "CreateNodeInput.llmModel", omitempty: true)
# @genqlient(for: "CreateNodeInput.nodeType", omitempty: true)
# @genqlient(for: "CreateNodeInput.ownerRepo", omitempty: true)
# @genqlient(for: "CreateNodeInput.reason", omitempty: true)
# @genqlient(for: "CreateNodeInput.properties", omitempty: true)
# @genqlient(for: "CreateNodeInput.seq", omitempty: true)
# @genqlient(for: "CreateNodeInput.tags", omitempty: true)
mutation CreateNode(
  $input: CreateNodeInput!
) {
  createNode(input: $input) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    seq
    isRunnable
    updatedAt
  }
}

# Update-only node write (spec 039 Phase 0). Target by `id` (PK or
# fully-qualified node URN) XOR (`memoryId` + `loc`) — both or neither is
# BAD_USER_INPUT; a miss is extensions.code NODE_NOT_FOUND (updateNode never
# creates). Every content field is optional: the server reads an *omitted*
# field as "preserve" (name and tags included) and an explicit null as
# "clear" — nil pointers must therefore be omitted from the wire, not
# serialized as null.
# @genqlient(for: "UpdateNodeInput.id", omitempty: true)
# @genqlient(for: "UpdateNodeInput.memoryId", omitempty: true)
# @genqlient(for: "UpdateNodeInput.loc", omitempty: true)
# @genqlient(for: "UpdateNodeInput.name", omitempty: true)
# @genqlient(for: "UpdateNodeInput.abstract", omitempty: true)
# @genqlient(for: "UpdateNodeInput.aiAgent", omitempty: true)
# @genqlient(for: "UpdateNodeInput.alias", omitempty: true)
# @genqlient(for: "UpdateNodeInput.content", omitempty: true)
# @genqlient(for: "UpdateNodeInput.contentType", omitempty: true)
# @genqlient(for: "UpdateNodeInput.data", omitempty: true)
# @genqlient(for: "UpdateNodeInput.description", omitempty: true)
# @genqlient(for: "UpdateNodeInput.edges", omitempty: true)
# @genqlient(for: "UpdateNodeInput.isRunnable", omitempty: true)
# @genqlient(for: "UpdateNodeInput.llmModel", omitempty: true)
# @genqlient(for: "UpdateNodeInput.nodeType", omitempty: true)
# @genqlient(for: "UpdateNodeInput.ownerRepo", omitempty: true)
# @genqlient(for: "UpdateNodeInput.reason", omitempty: true)
# @genqlient(for: "UpdateNodeInput.properties", omitempty: true)
# @genqlient(for: "UpdateNodeInput.seq", omitempty: true)
# @genqlient(for: "UpdateNodeInput.tags", omitempty: true)
mutation UpdateNode(
  $input: UpdateNodeInput!
) {
  updateNode(input: $input) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    isRunnable
    updatedAt
  }
}

# Soft-delete by default (sets deletedAt; recoverable via version history).
# hard: true removes the row entirely — cascades edges + NodeVersion, irreversible
# (#391). Omitted when false so a soft delete never sends an explicit hard: null.
mutation DeleteNode(
  $nodeRef: ID!
  # @genqlient(omitempty: true)
  $hard: Boolean
) {
  deleteNode(nodeRef: $nodeRef, hard: $hard)
}

# Import external content into a node (cor:api:130 / importNode #457, #488).
# Target: $nodeUrn XOR ($memoryId + $loc) — the URN may name a not-yet-existing
# node (import creates it). Source: exactly one of $url or $content; for
# application/pdf the $content is raw base64. Every input field is optional, and
# the server reads an *omitted* field differently from an explicit null — nil
# pointers must be omitted from the wire, hence the per-field omitempty
# annotations. Backs `hadron node import`'s content mode.
# @genqlient(for: "ImportNodeInput.memoryId", omitempty: true)
# @genqlient(for: "ImportNodeInput.loc", omitempty: true)
# @genqlient(for: "ImportNodeInput.nodeUrn", omitempty: true)
# @genqlient(for: "ImportNodeInput.url", omitempty: true)
# @genqlient(for: "ImportNodeInput.content", omitempty: true)
# @genqlient(for: "ImportNodeInput.contentType", omitempty: true)
# @genqlient(for: "ImportNodeInput.name", omitempty: true)
# @genqlient(for: "ImportNodeInput.nodeType", omitempty: true)
# @genqlient(for: "ImportNodeInput.properties", omitempty: true)
# @genqlient(for: "ImportNodeInput.taskRef", omitempty: true)
# @genqlient(for: "ImportNodeInput.taskArgs", omitempty: true)
# @genqlient(for: "ImportNodeInput.appRef", omitempty: true)
mutation ImportNode(
  $input: ImportNodeInput!
) {
  importNode(input: $input) {
    status
    jobId
    node {
      id
      memoryId
      loc
      name
      nodeType
      updatedAt
    }
  }
}

# Relocate a node (#564). $sourceRef is the node's id or full URN; the
# destination is EXACTLY ONE of $targetUrn (the node's new full URN — new
# memory and/or loc) or $targetMemoryRef (a memory id/URN; the node keeps its
# loc, only its memory changes). The node keeps its id, so edge references stay
# valid. Optional destination vars must be omitted (not sent as null) so the
# server sees exactly one. Backs `hadron node move`.
mutation MoveNode(
  $sourceRef: ID!
  # @genqlient(omitempty: true)
  $targetUrn: String
  # @genqlient(omitempty: true)
  $targetMemoryRef: ID
) {
  moveNode(sourceRef: $sourceRef, targetUrn: $targetUrn, targetMemoryRef: $targetMemoryRef) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    isRunnable
    updatedAt
  }
}

# Clone a node to a new location, returning the NEW node with a fresh id
# (#564). Same selector shape as MoveNode ($sourceRef + exactly one of
# $targetUrn / $targetMemoryRef). Copies the node's own fields plus the outgoing
# edges that naturally resolve at the destination; incoming edges are not
# copied. Backs `hadron node clone`.
mutation CloneNode(
  $sourceRef: ID!
  # @genqlient(omitempty: true)
  $targetUrn: String
  # @genqlient(omitempty: true)
  $targetMemoryRef: ID
) {
  cloneNode(sourceRef: $sourceRef, targetUrn: $targetUrn, targetMemoryRef: $targetMemoryRef) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    isRunnable
    updatedAt
  }
}

# Fold one node (source) into another (target), returning the surviving target
# (mergeNodes, #186). input.source / input.target are ids or fully-qualified
# URNs. `include` selects which fields fold in (ABSTRACT/CONTENT/DATA/
# DESCRIPTION/EDGES/PROPERTIES/TAGS); `deleteSource` hard-deletes it afterwards.
# Both optional inputs are omitempty so an unset one takes the server default
# (omit include = every mergeable field; omit deleteSource = keep the source).
# @genqlient(for: "MergeNodesInput.include", omitempty: true)
# @genqlient(for: "MergeNodesInput.deleteSource", omitempty: true)
mutation MergeNodes(
  $input: MergeNodesInput!
) {
  mergeNodes(input: $input) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    isRunnable
    updatedAt
  }
}

# Shallow-merge a JSON patch into a node's `data` bag (the supplied object's
# top-level keys overwrite existing ones; absent keys are preserved). Unlike
# UpdateNode's `data`, which replaces the whole bag, this is a merge — the
# server rejects a non-object patch with BAD_USER_INPUT. Backs the
# `--data-merge`/`--data-merge-file` flags on `hadron node update`.
mutation UpdateNodeData(
  $nodeRef: ID!
  $data: JSON!
  # @genqlient(omitempty: true)
  $reason: String
) {
  updateNodeData(nodeRef: $nodeRef, data: $data, reason: $reason) {
    id
    memoryId
    loc
    name
    nodeType
    tags
    isRunnable
    updatedAt
  }
}

# Unset optional variables must be omitted from the wire, not sent as
# explicit nulls — the server rejects priority: null (hadron-server#263)
# and treats condition/data: null as "clear".
mutation CreateEdge(
  $sourceRef: ID!
  $targetRef: ID!
  $name: String!
  # @genqlient(omitempty: true)
  $loc: String
  # @genqlient(omitempty: true)
  $description: String
  # @genqlient(omitempty: true)
  $isRunnable: Boolean
  # @genqlient(omitempty: true)
  $priority: Int
  # @genqlient(omitempty: true)
  $condition: JSON
  # @genqlient(omitempty: true)
  $data: JSON
) {
  createEdge(
    sourceRef: $sourceRef
    targetRef: $targetRef
    name: $name
    loc: $loc
    description: $description
    isRunnable: $isRunnable
    priority: $priority
    condition: $condition
    data: $data
  ) {
    id
    name
    loc
    isRunnable
    priority
    source {
      id
      loc
    }
    target {
      id
      loc
    }
  }
}

# Omitted = preserve, explicit null = clear (condition/data) or unset
# (priority). Flags the user didn't pass must not reach the wire.
mutation UpdateEdge(
  $edgeId: ID!
  # @genqlient(omitempty: true)
  $name: String
  # @genqlient(omitempty: true)
  $loc: String
  # @genqlient(omitempty: true)
  $description: String
  # @genqlient(omitempty: true)
  $isRunnable: Boolean
  # @genqlient(omitempty: true)
  $priority: Int
  # @genqlient(omitempty: true)
  $condition: JSON
  # @genqlient(omitempty: true)
  $data: JSON
) {
  updateEdge(
    edgeRef: $edgeId
    name: $name
    loc: $loc
    description: $description
    isRunnable: $isRunnable
    priority: $priority
    condition: $condition
    data: $data
  ) {
    id
    name
    loc
    isRunnable
    priority
    source {
      id
      loc
    }
    target {
      id
      loc
    }
  }
}

mutation DeleteEdge($edgeId: ID!) {
  deleteEdge(edgeRef: $edgeId)
}

# Bulk literal/regex search-and-replace across selected nodes (hadron-server#312).
# Unset optional selectors/flags serialize as null, which the server treats the
# same as absent (it checks `Array.isArray(nodeIds)` and null-vs-truthy on the
# flags), so no per-field omitempty is needed here.
mutation SearchReplaceInNodes($input: SearchReplaceInNodesInput!) {
  searchReplaceInNodes(input: $input) {
    nodesScanned
    nodesChanged
    totalReplacements
    dryRun
    results {
      nodeId
      loc
      memoryId
      replacements
      fields {
        field
        matches
      }
    }
  }
}

# Render one node to its canonical, round-trippable file via the SERVER's
# renderer (#106) — so `hadron node export` emits byte-for-byte what the portal
# and every other API client get from the one shared renderer. full: true is the
# canonical form (all sections, importable); format selects MD or JSON.
query NodeExport($id: ID!, $format: NodeExportFormat!) {
  nodeExport(id: $id, format: $format, full: true) {
    format
    mimeType
    filename
    data
    bytes
  }
}

# Minimal metadata for the `node export -o` summary (loc/name/memory): the
# server's nodeExport render returns the bytes but no identifying fields, and
# memory { urn } here avoids a second memory-list round-trip (#106 review).
query NodeExportMeta($ref: ID!) {
  node(ref: $ref) {
    loc
    name
    memoryId
    memory {
      urn
    }
  }
}
