# Node revision-history surface (hadron-server #617/#619/#620, renamed
# NodeVersion → NodeRevision in #623). nodeRef accepts a node PK or a
# fully-qualified URN; revisionId is a snapshot's opaque id.
#
# Editor identity (#620): editedBy is the User id when known; editedByInfo holds
# identity strings (github:/email:/user:/app:) when no User id resolves;
# editedByUser resolves either to PUBLIC identifiers only (handle + urn) — null
# when nothing resolves, in which case editedByInfo/editedBy are the fallback.
# revLabel is a user-settable label (also captures the edit's reason); changes
# lists which fields the edit modified (the snapshot is the pre-edit state).

# History for a node, most-recent-first. Per-snapshot memory-gated server-side.
query NodeRevisions(
  $nodeRef: ID!
  # @genqlient(omitempty: true)
  $limit: Int
) {
  nodeRevisions(nodeRef: $nodeRef, limit: $limit) {
    ...RevisionFields
  }
}

# A single snapshot for display (adds content). Null — never an error — when the
# node is unreadable or soft-deleted, so there is no existence disclosure.
query NodeRevision($revisionId: ID!) {
  nodeRevision(revisionId: $revisionId) {
    ...RevisionFields
    content
  }
}

# Restore a snapshot. Default snapshots-then-restores (undoable). truncate:true
# also deletes every snapshot newer than the selected one, which becomes the new
# baseline (restore+truncate is one atomic transaction). omitempty so an unset
# flag falls through to the server default (false), never sending null.
mutation RestoreNodeRevision(
  $revisionId: ID!
  # @genqlient(omitempty: true)
  $truncate: Boolean
) {
  restoreNodeRevision(revisionId: $revisionId, truncate: $truncate) {
    id
    memoryId
    loc
    name
    nodeType
    updatedAt
  }
}

# Delete one snapshot (memory-write auth; NOT_FOUND for an unknown id).
mutation DeleteNodeRevision($revisionId: ID!) {
  deleteNodeRevision(revisionId: $revisionId)
}

# Set a revision's user-facing label (#620, 500-char cap). Returns the full
# snapshot (and enforces the same read gates as nodeRevision).
mutation UpdateNodeRevision(
  $revisionId: ID!
  # @genqlient(omitempty: true)
  $revLabel: String
) {
  updateNodeRevision(revisionId: $revisionId, revLabel: $revLabel) {
    ...RevisionFields
  }
}

# Delete all of a node's snapshots, returning the count. Reachable on
# soft-deleted nodes (cleanup), so callers may pass a PK the read surfaces no
# longer resolve.
mutation ClearNodeHistory($nodeRef: ID!) {
  clearNodeHistory(nodeRef: $nodeRef)
}

# Shared projection for list / single-snapshot / label reads.
fragment RevisionFields on NodeRevision {
  id
  nodeId
  loc
  name
  description
  tags
  createdAt
  editedBy
  editedByInfo
  editedByUser {
    handle
    urn
  }
  revLabel
  changes
}
