  Company Brain gap that wasn't covered by the four legacy classes.
  """
  group
  knowledge
  personal

  """
  Single-owner, owner-only memory — no MemoryShare path (not
  shareable), no ADMIN/OWNER bypass. Spec 034 (hadron-server #242)
