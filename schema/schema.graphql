  Reference to the target node. Accepts a node ID, a full URN
  (hrn:node:<memory-urn>::<loc>), a memory-prefixed loc
  (<memory-urn>:<loc>), or a short loc resolved within the source
  node's memory.
  """
  targetId: String!
}

