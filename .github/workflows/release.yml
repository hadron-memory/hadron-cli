name: Release

# Cut a release for every v* tag: cross-platform archives + checksums on
# the GitHub Release, and (once HOMEBREW_TAP_TOKEN is configured and
# skip_upload flipped in .goreleaser.yaml) a cask bump pushed to
# hadron-memory/homebrew-tap.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser changelog needs history + tags
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to hadron-memory/homebrew-tap. The
          # default GITHUB_TOKEN cannot push to a sibling repo; until
          # this secret exists the cask stanza stays skip_upload: true
          # and the cask is bumped manually.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
