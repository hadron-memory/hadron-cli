name: Release

# Cut a release for every v* tag: cross-platform archives + checksums on
# the GitHub Release, and (once HOMEBREW_TAP_TOKEN is configured and
# skip_upload flipped in .goreleaser.yaml) a cask bump pushed to
# hadron-memory/homebrew-tap.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Actions are pinned to a full commit SHA (tag in a trailing comment), not a
# floating tag: this job holds HOMEBREW_TAP_TOKEN (cross-repo write), so a
# force-moved upstream tag must not be able to run new code with that PAT in
# scope (#119). Bump the SHA + comment together when upgrading.
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0 # goreleaser changelog needs history + tags
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to hadron-memory/homebrew-tap. The
          # default GITHUB_TOKEN cannot push to a sibling repo; until
          # this secret exists the cask stanza stays skip_upload: true
          # and the cask is bumped manually.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
