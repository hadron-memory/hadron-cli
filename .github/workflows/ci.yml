name: CI

# Third-party actions are pinned to a full commit SHA (with the human-readable
# tag in a trailing comment) rather than a floating tag, so a compromised or
# force-moved upstream tag can't silently change what runs here (#119). Bump the
# SHA + comment together when intentionally upgrading.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Codegen freshness
        run: |
          go tool genqlient
          git diff --exit-code -- internal/api/gen

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9

  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
      # Detective control for known-vulnerable dependencies (#124). govulncheck
      # is symbol-aware: it only fails on advisories the code actually reaches,
      # so an unreachable transitive CVE won't block a release. Pinned by module
      # version (immutable via the checksum DB).
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...

  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          args: check
