version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - unparam
  settings:
    errcheck:
      # CLI output to IOStreams: write errors to stdout/stderr are
      # not actionable.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        # deferred response-body closes
        - (io.ReadCloser).Close

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
